name: Expo Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android app
        run: eas build --platform android --non-interactive --wait

      - name: Get latest build info
        run: |
          eas build:list --platform android --limit 1 --non-interactive --json > build.json

      - name: Extract APK download URL
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('build.json'));
            const build = Array.isArray(j) ? j[0] : j.builds[0];
            const url = build.artifacts?.buildUrl;
            if (!url) { throw new Error('No buildUrl found in build data'); }
            console.log(url);
          " > apk_url.txt

      - name: Download APK
        run: |
          curl -L -o app.apk "$(cat apk_url.txt)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
